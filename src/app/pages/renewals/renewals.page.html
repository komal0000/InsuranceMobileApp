    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>Renewals</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="goToSearch()">
            <ion-icon name="search-outline"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
      <ion-toolbar color="primary">
        <ion-searchbar
          placeholder="Search renewals..."
          [(ngModel)]="search"
          (ionInput)="onSearch()"
          debounce="500"
          style="--background:rgba(255,255,255,0.15);--color:#fff;--placeholder-color:rgba(255,255,255,0.7);--icon-color:#fff;--clear-button-color:#fff">
        </ion-searchbar>
      </ion-toolbar>
      <ion-toolbar color="primary">
        <ion-segment [(ngModel)]="statusFilter" (ionChange)="onFilterChange()" class="header-segment">
          <ion-segment-button value="">All</ion-segment-button>
          <ion-segment-button value="draft">Draft</ion-segment-button>
          <ion-segment-button value="pending">Pending</ion-segment-button>
          <ion-segment-button value="approved">Approved</ion-segment-button>
        </ion-segment>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
        <ion-refresher-content></ion-refresher-content>
      </ion-refresher>

      <div *ngIf="loading && page === 1" class="loading-center">
        <ion-spinner name="crescent" color="primary"></ion-spinner>
      </div>

      <div class="list-content" *ngIf="renewals.length > 0">
        <ion-card *ngFor="let r of renewals" button (click)="viewDetail(r)" class="renewal-card">
          <ion-card-content>
            <div class="card-top-row">
              <span class="renewal-number">{{ r.enrollment_number || 'Renewal #' + r.id }}</span>
              <ion-badge [color]="getStatusColor(r.status)">{{ formatStatus(r.status) }}</ion-badge>
            </div>
            <span class="date-text">{{ r.created_at | date:'mediumDate' }}</span>
          </ion-card-content>
        </ion-card>
      </div>

      <div *ngIf="!loading && renewals.length === 0" class="empty-state ion-text-center ion-padding">
        <ion-icon name="refresh-outline" class="empty-icon"></ion-icon>
        <h3>No renewals found</h3>
        <p>Search for a policy to initiate a renewal</p>
        <ion-button (click)="goToSearch()">Search Policy</ion-button>
      </div>

      <ion-infinite-scroll (ionInfinite)="loadMore($event)" [disabled]="page >= lastPage">
        <ion-infinite-scroll-content loadingSpinner="crescent"></ion-infinite-scroll-content>
      </ion-infinite-scroll>

      <ion-fab slot="fixed" vertical="bottom" horizontal="end">
        <ion-fab-button (click)="goToSearch()">
          <ion-icon name="search-outline"></ion-icon>
        </ion-fab-button>
      </ion-fab>
    </ion-content>
