<ion-content [fullscreen]="true" [scrollY]="true" class="register-content">
  <div class="gradient-section">
    <button class="back-btn" routerLink="/login">
      <ion-icon name="arrow-back-outline"></ion-icon>
    </button>
    <div class="logo-circle">
      <ion-icon name="shield-checkmark-outline"></ion-icon>
    </div>
    <p class="header-title">Health Insurance Board, Nepal</p>
    <div class="red-line"></div>
    <p class="header-sub">Create your beneficiary account</p>
  </div>

  <div class="card-section">
    <div class="register-card">
      <h2 class="card-title">Register</h2>
      <p class="card-subtitle">Enter your beneficiary details. OTP verification and password setup happen on the login page.</p>
      <div class="accent-bar">
        <span class="bar-red"></span>
        <span class="bar-blue"></span>
      </div>

      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <ion-item lines="none" class="form-item">
          <ion-icon name="person-outline" slot="start" class="input-icon"></ion-icon>
          <ion-input placeholder="Enter your full name" [(ngModel)]="formData.name"></ion-input>
        </ion-item>
      </div>

      <div class="form-group">
        <label class="form-label">Full Name (Nepali) *</label>
        <ion-item lines="none" class="form-item">
          <ion-input
            placeholder="Type in English e.g. Komal Shrestha"
            appNepaliInput
            [(ngModel)]="formData.name_ne">
          </ion-input>
        </ion-item>
      </div>

      <div class="form-group">
        <label class="form-label">Mobile Number *</label>
        <ion-item lines="none" class="form-item">
          <ion-icon name="call-outline" slot="start" class="input-icon"></ion-icon>
          <ion-input
            type="tel"
            placeholder="98XXXXXXXX"
            [(ngModel)]="formData.mobile_number"
            maxlength="10"
            inputmode="numeric">
          </ion-input>
        </ion-item>
      </div>

      <div class="form-group">
        <label class="form-label">Email (Optional)</label>
        <ion-item lines="none" class="form-item">
          <ion-icon name="mail-outline" slot="start" class="input-icon"></ion-icon>
          <ion-input
            type="email"
            placeholder="email@example.com"
            [(ngModel)]="formData.email">
          </ion-input>
        </ion-item>
      </div>

      <ion-button expand="block" (click)="register()" [disabled]="loading" class="register-btn">
        <ion-spinner *ngIf="loading" name="crescent" slot="start"></ion-spinner>
        {{ loading ? 'Saving...' : 'Register' }}
      </ion-button>

      <div class="login-link">
        <span>Already have an account?</span>
        <a routerLink="/login">Sign In</a>
      </div>
    </div>
  </div>
</ion-content>
