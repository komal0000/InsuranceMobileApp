    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>{{ t('notifications.title') }}</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="markAllRead()" *ngIf="hasUnread" fill="clear" color="light">
            <ion-icon name="checkmark-done-outline" slot="start"></ion-icon>
            {{ t('notifications.read_all') }}
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
        <ion-refresher-content></ion-refresher-content>
      </ion-refresher>

      <div *ngIf="loading && page === 1" class="loading-center">
        <ion-spinner name="crescent" color="primary"></ion-spinner>
      </div>

      <div class="notif-content" *ngIf="notifications.length > 0">
        <div *ngFor="let n of notifications" class="notif-item" [class.unread]="!n.is_read"
          (click)="markAsRead(n)">
          <div class="notif-icon-box" [class.read]="n.is_read">
            <ion-icon [name]="n.is_read ? 'mail-open-outline' : 'mail-outline'"></ion-icon>
          </div>
          <div class="notif-body">
            <div class="notif-top-row">
              <strong>{{ n.title || t('notifications.fallback_title') }}</strong>
              <ion-badge color="primary" *ngIf="!n.is_read" class="new-badge">{{ t('notifications.new') }}</ion-badge>
            </div>
            <p class="notif-message">{{ n.message }}</p>
            <span class="notif-date">{{ displayDateTime(n.created_at) }}</span>
          </div>
        </div>
      </div>

      <div *ngIf="!loading && notifications.length === 0" class="empty-state ion-text-center ion-padding">
        <ion-icon name="notifications-outline" class="empty-icon"></ion-icon>
        <h3>{{ t('notifications.empty_title') }}</h3>
        <p>{{ t('notifications.empty_message') }}</p>
      </div>

      <ion-infinite-scroll (ionInfinite)="loadMore($event)" [disabled]="page >= lastPage">
        <ion-infinite-scroll-content loadingSpinner="crescent"></ion-infinite-scroll-content>
      </ion-infinite-scroll>
    </ion-content>
