    <ion-tabs>
      <ion-tab-bar slot="bottom">
        <ion-tab-button tab="dashboard">
          <ion-icon name="home-outline"></ion-icon>
          <ion-label>{{ t('tabs.home') }}</ion-label>
        </ion-tab-button>

        <ion-tab-button tab="enrollments" *ngIf="!hideEnrollmentTab">
          <ion-icon name="document-text-outline"></ion-icon>
          <ion-label>{{ t('tabs.enrollments') }}</ion-label>
        </ion-tab-button>

        <ion-tab-button tab="renewals">
          <ion-icon name="refresh-outline"></ion-icon>
          <ion-label>{{ t('tabs.renewals') }}</ion-label>
        </ion-tab-button>

        <ion-tab-button tab="notifications">
          <ion-icon name="notifications-outline"></ion-icon>
          <ion-label>{{ t('tabs.alerts') }}</ion-label>
          <ion-badge color="danger" *ngIf="unreadCount > 0">{{ unreadCount > 99 ? '99+' : unreadCount }}</ion-badge>
        </ion-tab-button>

        <ion-tab-button tab="profile">
          <ion-icon name="person-outline"></ion-icon>
          <ion-label>{{ t('tabs.profile') }}</ion-label>
        </ion-tab-button>
      </ion-tab-bar>
    </ion-tabs>
